<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banque API - Gestion des Comptes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        header p {
            opacity: 0.9;
        }
        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 30px;
        }
        .section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        .accounts-list {
            margin-top: 20px;
        }
        .account-card {
            background: white;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: box-shadow 0.3s;
        }
        .account-card:hover {
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }
        .account-info {
            flex: 1;
        }
        .account-name {
            font-weight: 600;
            color: #333;
        }
        .account-email {
            font-size: 0.9em;
            color: #666;
        }
        .account-balance {
            font-size: 1.3em;
            color: #667eea;
            font-weight: 700;
            margin-right: 15px;
        }
        .message {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }
        .loading {
            text-align: center;
            padding: 10px;
            color: #667eea;
            font-weight: 600;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .action-buttons button {
            flex: 1;
            padding: 8px;
            font-size: 0.9em;
        }
        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
            header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Banque API</h1>
            <p>Gestion des comptes bancaires en temps réel</p>
        </header>
        
        <div class="content">
            <!-- Créer un compte -->
            <div class="section">
                <h2>Créer un Compte</h2>
                <div id="createMessage" class="message"></div>
                <form id="createForm">
                    <div class="form-group">
                        <label for="holderName">Nom du titulaire</label>
                        <input type="text" id="holderName" placeholder="Jean Dupont" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="jean@example.com" required>
                    </div>
                    <button type="submit">Créer le Compte</button>
                </form>
            </div>

            <!-- Opérations sur compte -->
            <div class="section">
                <h2>Opérations</h2>
                <div id="operationMessage" class="message"></div>
                <div class="form-group">
                    <label for="selectedAccount">Sélectionner un compte</label>
                    <select id="selectedAccount">
                        <option value="">Choisir un compte...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="amount">Montant (€)</label>
                    <input type="number" id="amount" placeholder="100" min="0.01" step="0.01" required>
                </div>
                <div class="action-buttons">
                    <button onclick="deposit()">Dépôt</button>
                    <button onclick="withdraw()">Retrait</button>
                </div>
            </div>

            <!-- Tous les comptes -->
            <div class="section" style="grid-column: 1 / -1;">
                <h2>Tous les Comptes</h2>
                <div id="loadingMessage" class="loading" style="display: none;">⏳ Chargement...</div>
                <div id="messageBox" class="message"></div>
                <div id="accountsList" class="accounts-list"></div>
            </div>
        </div>
    </div>

    <script>
        // Configuration API
        const API_URL = window.location.origin === 'http://localhost:8000' 
            ? 'http://localhost:8000/api'
            : 'https://banque-api-django.onrender.com/api';

        // Afficher les messages
        function showMessage(message, type, elementId) {
            const msgBox = document.getElementById(elementId);
            msgBox.textContent = message;
            msgBox.className = `message ${type}`;
            setTimeout(() => msgBox.className = 'message', 5000);
        }

        // Charger et afficher tous les comptes
        async function loadAccounts() {
            try {
                document.getElementById('loadingMessage').style.display = 'block';
                const response = await fetch(`${API_URL}/`);
                const data = await response.json();
                
                const accountsList = document.getElementById('accountsList');
                const selectAccount = document.getElementById('selectedAccount');
                
                accountsList.innerHTML = '';
                selectAccount.innerHTML = '<option value="">Choisir un compte...</option>';
                
                if (Array.isArray(data)) {
                    data.forEach(account => {
                        // Ajouter à la liste
                        const card = document.createElement('div');
                        card.className = 'account-card';
                        card.innerHTML = `
                            <div class="account-info">
                                <div class="account-name">${account.holder}</div>
                                <div class="account-email">${account.email}</div>
                            </div>
                            <div class="account-balance">${parseFloat(account.balance).toFixed(2)} €</div>
                        `;
                        accountsList.appendChild(card);
                        
                        // Ajouter au select
                        const option = document.createElement('option');
                        option.value = account.id;
                        option.textContent = `${account.holder} (${parseFloat(account.balance).toFixed(2)} €)`;
                        selectAccount.appendChild(option);
                    });
                }
                document.getElementById('loadingMessage').style.display = 'none';
                showMessage('✅ Comptes chargés avec succès', 'success', 'messageBox');
            } catch (error) {
                document.getElementById('loadingMessage').style.display = 'none';
                showMessage(`❌ Erreur: ${error.message}`, 'error', 'messageBox');
            }
        }

        // Créer un compte
        document.getElementById('createForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const holder = document.getElementById('holderName').value;
            const email = document.getElementById('email').value;

            try {
                const response = await fetch(`${API_URL}/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ holder, email })
                });
                const data = await response.json();
                
                if (response.ok) {
                    showMessage(`✅ Compte créé pour ${holder}`, 'success', 'createMessage');
                    document.getElementById('createForm').reset();
                    loadAccounts();
                } else {
                    showMessage(`❌ ${data.error || 'Erreur lors de la création'}`, 'error', 'createMessage');
                }
            } catch (error) {
                showMessage(`❌ Erreur: ${error.message}`, 'error', 'createMessage');
            }
        });

        // Dépôt
        async function deposit() {
            const accountId = document.getElementById('selectedAccount').value;
            const amount = document.getElementById('amount').value;

            if (!accountId) {
                showMessage('⚠️ Veuillez sélectionner un compte', 'error', 'operationMessage');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/${accountId}/deposit/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount })
                });
                const data = await response.json();
                
                if (response.ok) {
                    showMessage(`✅ Dépôt de ${amount} € effectué. Nouveau solde: ${parseFloat(data.new_balance).toFixed(2)} €`, 'success', 'operationMessage');
                    document.getElementById('amount').value = '';
                    loadAccounts();
                } else {
                    showMessage(`❌ ${data.error}`, 'error', 'operationMessage');
                }
            } catch (error) {
                showMessage(`❌ Erreur: ${error.message}`, 'error', 'operationMessage');
            }
        }

        // Retrait
        async function withdraw() {
            const accountId = document.getElementById('selectedAccount').value;
            const amount = document.getElementById('amount').value;

            if (!accountId) {
                showMessage('⚠️ Veuillez sélectionner un compte', 'error', 'operationMessage');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/${accountId}/withdraw/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount })
                });
                const data = await response.json();
                
                if (response.ok) {
                    showMessage(`✅ Retrait de ${amount} € effectué. Nouveau solde: ${parseFloat(data.new_balance).toFixed(2)} €`, 'success', 'operationMessage');
                    document.getElementById('amount').value = '';
                    loadAccounts();
                } else {
                    showMessage(`❌ ${data.error}`, 'error', 'operationMessage');
                }
            } catch (error) {
                showMessage(`❌ Erreur: ${error.message}`, 'error', 'operationMessage');
            }
        }

        // Charger les comptes au démarrage
        loadAccounts();
        // Actualiser toutes les 10 secondes
        setInterval(loadAccounts, 10000);
    </script>
</body>
</html>
