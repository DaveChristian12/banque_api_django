services:
  - type: web
    name: banque-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python start_server.py
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.14
      - key: DATABASE_URL
        value: sqlite:///db.sqlite3
